server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://${RESOURCE_DB_HOST:localhost}:${RESOURCE_DB_PORT:3306}/${RESOURCE_DB_NAME:resource_service_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${RESOURCE_DB_USERNAME:resource_service}
    password: ${RESOURCE_DB_PASSWORD:resource_service}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

eureka:
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  file:
    name: ${LOG_PATH:logs}/resource-service.log
